server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Re-resolve Docker DNS so gateway container IP changes do not break proxying.
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $api_gateway http://api-gateway:8000;

    location /graphql {
        proxy_pass $api_gateway/graphql;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api {
        # Preserve the full original path (/api/...) when proxying.
        proxy_pass $api_gateway;
        proxy_set_header Host $host;
    }

    # SPA fallback for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }
}
