server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss application/xml image/svg+xml;

    # Re-resolve Docker DNS so gateway container IP changes do not break proxying.
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $api_gateway http://api-gateway:8000;

    location /graphql {
        proxy_pass $api_gateway/graphql;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api {
        # Preserve the full original path (/api/...) when proxying.
        proxy_pass $api_gateway;
        proxy_set_header Host $host;
    }

    # Cache hashed static assets aggressively for faster repeat loads.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback for React Router
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
