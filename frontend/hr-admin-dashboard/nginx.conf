server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Re-resolve Docker DNS so gateway container IP changes do not break proxying.
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $api_gateway http://api-gateway:8000;

    # Proxy GraphQL to API Gateway
    location /graphql {
        proxy_pass $api_gateway/graphql;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Proxy REST API to API Gateway
    location /api {
        proxy_pass $api_gateway/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback for Angular routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}

