AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Smart Hiring Assistant - Phase 2 Job Analyzer Lambda (independently deployable)

Globals:
  Function:
    Runtime: java17
    Timeout: 20
    MemorySize: 1024
    Tracing: Active
    Environment:
      Variables:
        LOG_LEVEL: INFO

Resources:
  JobAnalyzerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: sha-phase2-job-analyzer
      Handler: org.vinod.sha.serverless.job.JobAnalyzerLambda::handleRequest
      CodeUri: functions/job-analyzer-lambda/build/function.zip
      Description: Job Analyzer Lambda - stateless, independently deployable
      Events:
        JobAnalyzeApi:
          Type: Api
          Properties:
            Path: /job/analyze
            Method: post
        HealthApi:
          Type: Api
          Properties:
            Path: /health
            Method: get

Outputs:
  JobAnalyzerApi:
    Description: API endpoint for job analyzer lambda
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/job/analyze"
    Export:
      Name: JobAnalyzerApiEndpoint

  JobAnalyzerHealthEndpoint:
    Description: Health check endpoint for job analyzer lambda
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/health"
    Export:
      Name: JobAnalyzerHealthEndpoint

  JobAnalyzerFunctionArn:
    Description: ARN of Job Analyzer Lambda function
    Value: !GetAtt JobAnalyzerFunction.Arn
    Export:
      Name: JobAnalyzerFunctionArn

