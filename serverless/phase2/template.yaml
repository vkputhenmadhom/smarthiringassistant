AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Smart Hiring Assistant - Phase 2 AI Integration Lambda (independently deployable)

Globals:
  Function:
    Runtime: java17
    Timeout: 20
    MemorySize: 1024
    Tracing: Active
    Environment:
      Variables:
        LOG_LEVEL: INFO

Resources:
  AiIntegrationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: sha-phase2-ai-integration
      Handler: org.vinod.sha.serverless.ai.AiIntegrationLambda::handleRequest
      CodeUri: functions/ai-integration-lambda/build/function.zip
      Description: AI Integration Lambda - stateless, independently deployable
      Events:
        AiGenerateApi:
          Type: Api
          Properties:
            Path: /ai/generate
            Method: post
        HealthApi:
          Type: Api
          Properties:
            Path: /health
            Method: get

Outputs:
  AiIntegrationApi:
    Description: API endpoint for AI generation lambda
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/ai/generate"
    Export:
      Name: AiIntegrationApiEndpoint

  HealthEndpoint:
    Description: Health check endpoint
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/health"
    Export:
      Name: AiIntegrationHealthEndpoint

  FunctionArn:
    Description: ARN of AI Integration Lambda function
    Value: !GetAtt AiIntegrationFunction.Arn
    Export:
      Name: AiIntegrationFunctionArn

# Test
