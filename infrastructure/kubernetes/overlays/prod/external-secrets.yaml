apiVersion: v1
kind: ServiceAccount
metadata:
  name: smart-hiring-external-secrets
  namespace: smart-hiring
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/smart-hiring-external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager-prod
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: smart-hiring-external-secrets
            namespace: smart-hiring
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: smart-hiring-secrets
  namespace: smart-hiring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secretsmanager-prod
  target:
    name: smart-hiring-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: smart-hiring/prod/application

