apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: api-gateway
  namespace: smart-hiring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - smart-hiring
  selector:
    matchLabels:
      app: api-gateway
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
---
