apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: smart-hiring
  labels:
    app: notification-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: ghcr.io/your-org/smart-hiring/notification-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8007
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/smart_hiring_db
            - name: SPRING_DATASOURCE_USERNAME
              value: hiring_user
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smart-hiring-secrets
                  key: postgres-password
            - name: SPRING_RABBITMQ_HOST
              value: rabbitmq
            - name: SPRING_RABBITMQ_PORT
              value: "5672"
            - name: SPRING_RABBITMQ_USERNAME
              value: hiring_user
            - name: SPRING_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smart-hiring-secrets
                  key: rabbitmq-password
            - name: MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: smart-hiring-secrets
                  key: mail-username
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smart-hiring-secrets
                  key: mail-password
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: smart-hiring-secrets
                  key: twilio-account-sid
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: smart-hiring-secrets
                  key: twilio-auth-token
            - name: TWILIO_FROM_NUMBER
              valueFrom:
                secretKeyRef:
                  name: smart-hiring-secrets
                  key: twilio-from-number
          readinessProbe:
            httpGet:
              path: /api/notifications/actuator/health/readiness
              port: 8007
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/notifications/actuator/health/liveness
              port: 8007
            initialDelaySeconds: 75
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: smart-hiring
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 8007
      targetPort: 8007
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: notification-service-hpa
  namespace: smart-hiring
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: notification-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

