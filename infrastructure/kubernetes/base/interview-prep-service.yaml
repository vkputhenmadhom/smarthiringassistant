apiVersion: apps/v1
kind: Deployment
metadata:
  name: interview-prep-service
  namespace: smart-hiring
  labels:
    app: interview-prep-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: interview-prep-service
  template:
    metadata:
      labels:
        app: interview-prep-service
    spec:
      containers:
        - name: interview-prep-service
          image: ghcr.io/your-org/smart-hiring/interview-prep-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8004
          env:
            - name: SPRING_MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: smart-hiring-secrets
                  key: mongodb-uri
            - name: SPRING_RABBITMQ_HOST
              value: rabbitmq
            - name: SPRING_RABBITMQ_PORT
              value: "5672"
            - name: SPRING_RABBITMQ_USERNAME
              value: hiring_user
            - name: SPRING_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smart-hiring-secrets
                  key: rabbitmq-password
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: smart-hiring-secrets
                  key: openai-api-key
          readinessProbe:
            httpGet:
              path: /api/interviews/actuator/health/readiness
              port: 8004
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/interviews/actuator/health/liveness
              port: 8004
            initialDelaySeconds: 75
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: interview-prep-service
  namespace: smart-hiring
spec:
  selector:
    app: interview-prep-service
  ports:
    - name: http
      port: 8004
      targetPort: 8004
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: interview-prep-service-hpa
  namespace: smart-hiring
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: interview-prep-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

