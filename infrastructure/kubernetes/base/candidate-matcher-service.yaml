apiVersion: apps/v1
kind: Deployment
metadata:
  name: candidate-matcher-service
  namespace: smart-hiring
  labels:
    app: candidate-matcher-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: candidate-matcher-service
  template:
    metadata:
      labels:
        app: candidate-matcher-service
    spec:
      containers:
        - name: candidate-matcher-service
          image: ghcr.io/your-org/smart-hiring/candidate-matcher-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8003
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/smart_hiring_db
            - name: SPRING_DATASOURCE_USERNAME
              value: hiring_user
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smart-hiring-secrets
                  key: postgres-password
            - name: SPRING_RABBITMQ_HOST
              value: rabbitmq
            - name: SPRING_RABBITMQ_PORT
              value: "5672"
            - name: SPRING_RABBITMQ_USERNAME
              value: hiring_user
            - name: SPRING_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smart-hiring-secrets
                  key: rabbitmq-password
            - name: SPRING_DATA_REDIS_HOST
              value: redis
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smart-hiring-secrets
                  key: redis-password
          readinessProbe:
            httpGet:
              path: /api/matches/actuator/health/readiness
              port: 8003
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/matches/actuator/health/liveness
              port: 8003
            initialDelaySeconds: 75
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: candidate-matcher-service
  namespace: smart-hiring
spec:
  selector:
    app: candidate-matcher-service
  ports:
    - name: http
      port: 8003
      targetPort: 8003
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: candidate-matcher-service-hpa
  namespace: smart-hiring
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: candidate-matcher-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

