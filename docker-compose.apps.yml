
# App-layer compose file with health checks and baseline scaling hints.
# Use together with docker-compose.yml (infra):
# docker compose -f docker-compose.yml -f docker-compose.apps.yml up -d --build
services:
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/smart_hiring_db
      SPRING_DATASOURCE_USERNAME: hiring_user
      SPRING_DATASOURCE_PASSWORD: hiring_password
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: hiring_user
      SPRING_RABBITMQ_PASSWORD: hiring_password
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID is required (set it in .env)}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?GOOGLE_CLIENT_SECRET is required (set it in .env)}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8000/api/auth/login/oauth2/code/google}
      OAUTH2_SUCCESS_REDIRECT_URI: ${OAUTH2_SUCCESS_REDIRECT_URI:-http://localhost:5173/auth/callback}
      OAUTH2_FAILURE_REDIRECT_URI: ${OAUTH2_FAILURE_REDIRECT_URI:-http://localhost:5173/login}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1.00'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - smart-hiring-network

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/smart_hiring_db
      SPRING_DATASOURCE_USERNAME: hiring_user
      SPRING_DATASOURCE_PASSWORD: hiring_password
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: hiring_user
      SPRING_RABBITMQ_PASSWORD: hiring_password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: hiring_password
    depends_on:
      auth-service:
        condition: service_started
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8000/actuator/health || wget -q -O /dev/null http://localhost:8000/"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1.00'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - smart-hiring-network

  resume-parser-service:
    build:
      context: .
      dockerfile: services/resume-parser-service/Dockerfile
    ports:
      - "8002:8002"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/smart_hiring_db
      SPRING_DATASOURCE_USERNAME: hiring_user
      SPRING_DATASOURCE_PASSWORD: hiring_password
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: hiring_user
      SPRING_RABBITMQ_PASSWORD: hiring_password
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8002/api/resumes/actuator/health || wget -q -O /dev/null http://localhost:8002/"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1.00'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - smart-hiring-network

  candidate-matcher-service:
    build:
      context: .
      dockerfile: services/candidate-matcher-service/Dockerfile
    ports:
      - "8003:8003"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/smart_hiring_db
      SPRING_DATASOURCE_USERNAME: hiring_user
      SPRING_DATASOURCE_PASSWORD: hiring_password
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: hiring_user
      SPRING_RABBITMQ_PASSWORD: hiring_password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: hiring_password
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8003/api/matches/actuator/health || wget -q -O /dev/null http://localhost:8003/"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1.00'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - smart-hiring-network

  interview-prep-service:
    build:
      context: .
      dockerfile: services/interview-prep-service/Dockerfile
    ports:
      - "8004:8004"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/smart_hiring_db
      SPRING_DATASOURCE_USERNAME: hiring_user
      SPRING_DATASOURCE_PASSWORD: hiring_password
      SPRING_MONGODB_URI: mongodb://hiring_user:hiring_password@mongodb:27017/smart_hiring_db?authSource=admin
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: hiring_user
      SPRING_RABBITMQ_PASSWORD: hiring_password
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8004/api/interviews/actuator/health || wget -q -O /dev/null http://localhost:8004/"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1.00'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - smart-hiring-network

  screening-bot-service:
    build:
      context: .
      dockerfile: services/screening-bot-service/Dockerfile
    ports:
      - "8006:8006"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_MONGODB_URI: mongodb://hiring_user:hiring_password@mongodb:27017/smart_hiring_db?authSource=admin
      SPRING_DATA_MONGODB_URI: mongodb://hiring_user:hiring_password@mongodb:27017/smart_hiring_db?authSource=admin
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: hiring_user
      SPRING_RABBITMQ_PASSWORD: hiring_password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: hiring_password
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8006/api/screening/actuator/health || wget -q -O /dev/null http://localhost:8006/"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1.00'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - smart-hiring-network

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    ports:
      - "8007:8007"
    environment:
      SPRING_PROFILES_ACTIVE: ${NOTIFICATION_SPRING_PROFILES_ACTIVE:-docker}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/smart_hiring_db
      SPRING_DATASOURCE_USERNAME: hiring_user
      SPRING_DATASOURCE_PASSWORD: hiring_password
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: hiring_user
      SPRING_RABBITMQ_PASSWORD: hiring_password
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MANAGEMENT_HEALTH_MAIL_ENABLED: ${MANAGEMENT_HEALTH_MAIL_ENABLED:-false}
      NOTIFICATION_EMAIL_ENABLED: ${NOTIFICATION_EMAIL_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8007/api/notifications/actuator/health || wget -q -O /dev/null http://localhost:8007/"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1.00'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - smart-hiring-network

  mailhog:
    image: mailhog/mailhog:v1.0.1
    profiles:
      - mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped
    networks:
      - smart-hiring-network

  # ── Angular HR Admin Dashboard ────────────────────────────────────────────
  hr-admin-dashboard:
    build:
      context: ./frontend/hr-admin-dashboard
      dockerfile: Dockerfile
    container_name: smart-hiring-hr-dashboard
    ports:
      - "4200:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - smart-hiring-network

  # ── React Candidate Portal ─────────────────────────────────────────────────
  candidate-portal:
    build:
      context: ./frontend/candidate-portal
      dockerfile: Dockerfile
    container_name: smart-hiring-candidate-portal
    ports:
      - "5173:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - smart-hiring-network

networks:
  smart-hiring-network:
    driver: bridge

