name: serverless-phase1

on:
  pull_request:
    paths:
      - 'serverless/phase1/**'
      - 'scripts/serverless-phase1-smoke.sh'
      - '.github/workflows/serverless-phase1.yml'
      - 'settings.gradle'
      - 'build.gradle'
  push:
    branches: [ main ]
    paths:
      - 'serverless/phase1/**'
      - 'scripts/serverless-phase1-smoke.sh'
      - '.github/workflows/serverless-phase1.yml'
      - 'settings.gradle'
      - 'build.gradle'
  workflow_dispatch:
    inputs:
      run_full_local_invoke:
        description: 'Run full SAM local invoke (requires Docker on GitHub runner)'
        required: false
        default: false
        type: boolean

env:
  AWS_REGION: us-east-1

jobs:
  build-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Install SAM CLI
        run: pip install --upgrade aws-sam-cli

      - name: Run serverless phase-1 smoke (CI mode)
        run: |
          chmod +x scripts/serverless-phase1-smoke.sh
          SKIP_LOCAL_INVOKE=true AWS_REGION=${{ env.AWS_REGION }} ./scripts/serverless-phase1-smoke.sh

      - name: Validate SAM template lint rules
        run: sam validate --lint -t serverless/phase1/template.yaml --region ${{ env.AWS_REGION }}

  manual-full-local-invoke:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_full_local_invoke == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Install SAM CLI
        run: pip install --upgrade aws-sam-cli

      - name: Run serverless phase-1 smoke (full invoke)
        run: |
          chmod +x scripts/serverless-phase1-smoke.sh
          AWS_REGION=${{ env.AWS_REGION }} ./scripts/serverless-phase1-smoke.sh
