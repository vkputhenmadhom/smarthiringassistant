name: frontend-apps

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'frontend/**'
      - 'scripts/hr-click-validate.js'
      - 'docker-compose.yml'
      - 'docker-compose.apps.yml'
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - 'scripts/hr-click-validate.js'
      - 'docker-compose.yml'
      - 'docker-compose.apps.yml'

jobs:
  detect-changed-apps:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
      count: ${{ steps.compute.outputs.count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute changed frontend app matrix
        id: compute
        shell: bash
        run: |
          set -euo pipefail

          APPS=(candidate-portal hr-admin-dashboard)

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          if [[ -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            SELECTED=("${APPS[@]}")
          else
            CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
            echo "$CHANGED_FILES"
            SELECTED=()
            for app in "${APPS[@]}"; do
              if echo "$CHANGED_FILES" | grep -Eq "^frontend/${app}/"; then
                SELECTED+=("$app")
              fi
            done
          fi

          if [[ ${#SELECTED[@]} -eq 0 ]]; then
            echo 'matrix={"app":[]}' >> "$GITHUB_OUTPUT"
            echo 'count=0' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MATRIX_JSON="$(printf '%s\n' "${SELECTED[@]}" | python3 -c 'import json,sys; print(json.dumps({"app":[l.strip() for l in sys.stdin if l.strip()]}))')"
          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"
          echo "count=${#SELECTED[@]}" >> "$GITHUB_OUTPUT"

  build-frontend:
    needs: detect-changed-apps
    if: needs.detect-changed-apps.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changed-apps.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        working-directory: frontend/${{ matrix.app }}
        run: npm ci

      - name: Build
        working-directory: frontend/${{ matrix.app }}
        run: npm run build

      - name: Prepare publish metadata
        run: |
          mkdir -p out
          cat > "out/${{ matrix.app }}.json" <<EOF
          {
            "component": "frontend/${{ matrix.app }}",
            "sha": "${{ github.sha }}",
            "builtAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Upload publish metadata
        uses: actions/upload-artifact@v4
        with:
          name: frontend-publish-${{ matrix.app }}
          path: out/${{ matrix.app }}.json

  hr-admin-click-smoke:
    needs: detect-changed-apps
    if: github.event_name == 'workflow_dispatch' || contains(needs.detect-changed-apps.outputs.matrix, 'hr-admin-dashboard')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright runtime
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Start required stack for HR click smoke
        env:
          GOOGLE_CLIENT_ID: ci-google-client-id
          GOOGLE_CLIENT_SECRET: ci-google-client-secret
          JWT_SECRET: ci-local-jwt-secret-for-smoke-tests-please-change
        run: |
          docker compose -f docker-compose.yml -f docker-compose.apps.yml up -d --build \
            postgres mongodb rabbitmq redis \
            auth-service api-gateway \
            job-analyzer-service screening-bot-service \
            hr-admin-dashboard

      - name: Wait for gateway and HR frontend
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..60}; do
            if curl -fsS http://localhost:8000/actuator/health >/dev/null && curl -fsS http://localhost:4200 >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Gateway/frontend did not become ready in time" >&2
          docker compose -f docker-compose.yml -f docker-compose.apps.yml ps
          exit 1

      - name: Run HR click validation
        run: |
          node scripts/hr-click-validate.js

      - name: Dump compose logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.apps.yml ps
          docker compose -f docker-compose.yml -f docker-compose.apps.yml logs --tail=200

      - name: Tear down stack
        if: always()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.apps.yml down -v

