name: Deploy Phase 2 - Job Analyzer Lambda

# Trigger ONLY when job-analyzer-lambda or its SAM assets change
# This keeps deployment independent from AI Integration and Phase 1.
on:
  push:
    branches:
      - main
    paths:
      - 'serverless/phase2/functions/job-analyzer-lambda/**'
      - 'serverless/phase2/job-analyzer-template.yaml'
      - 'serverless/phase2/job-analyzer-samconfig.toml'
      - 'serverless/phase2/events/job-analyze-request.json'
      - 'serverless/phase2/events/job-analyzer-health-check.json'
      - '.github/workflows/deploy-phase2-job-analyzer.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'serverless/phase2/functions/job-analyzer-lambda/**'
      - 'serverless/phase2/job-analyzer-template.yaml'
      - 'serverless/phase2/job-analyzer-samconfig.toml'
      - '.github/workflows/deploy-phase2-job-analyzer.yml'

env:
  AWS_REGION: us-east-1
  LAMBDA_MODULE: serverless/phase2/functions/job-analyzer-lambda
  SAM_TEMPLATE: serverless/phase2/job-analyzer-template.yaml
  STACK_NAME: smart-hiring-phase2-job-analyzer

jobs:
  # Single CI job: build → test → package → validate SAM
  # No artifact upload/download needed.
  ci:
    name: Build, Test & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build
        run: ./gradlew :serverless:phase2:functions:job-analyzer-lambda:build -x test --no-daemon

      - name: Test
        run: ./gradlew :serverless:phase2:functions:job-analyzer-lambda:test --no-daemon

      - name: Package Lambda ZIP
        run: ./gradlew :serverless:phase2:functions:job-analyzer-lambda:packageLambdaZip --no-daemon

      - name: Verify ZIP
        run: ls -lh ${{ env.LAMBDA_MODULE }}/build/function.zip

      - name: Install SAM CLI
        run: pip install --upgrade aws-sam-cli

      - name: Validate SAM template
        run: sam validate -t ${{ env.SAM_TEMPLATE }} --lint --region ${{ env.AWS_REGION }}

  # Deploy job: only on push to main, after ci passes.
  # Rebuilds ZIP locally so there is no artifact transfer between jobs.
  deploy:
    name: Deploy to AWS Lambda
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Package Lambda ZIP
        run: ./gradlew :serverless:phase2:functions:job-analyzer-lambda:packageLambdaZip --no-daemon

      - name: Install SAM CLI
        run: pip install --upgrade aws-sam-cli

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy using SAM
        run: |
          sam deploy \
            --template-file ${{ env.SAM_TEMPLATE }} \
            --stack-name ${{ env.STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --s3-prefix ${{ env.STACK_NAME }} \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      - name: Health check (smoke test)
        run: |
          HEALTH_ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query 'Stacks[0].Outputs[?OutputKey==`JobAnalyzerHealthEndpoint`].OutputValue' \
            --output text)

          echo "Health endpoint: $HEALTH_ENDPOINT"

          for i in {1..5}; do
            echo "Health check attempt $i..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_ENDPOINT" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✓ Health check passed (HTTP 200)"
              exit 0
            fi
            echo "⚠ HTTP $HTTP_CODE, retrying in 5s..."
            sleep 5
          done

          echo "✗ Health check failed after 5 attempts"
          exit 1

      - name: Deployment summary
        if: always()
        run: |
          echo "## Phase 2 Job Analyzer Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Stack | ${{ env.STACK_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Region | ${{ env.AWS_REGION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY

