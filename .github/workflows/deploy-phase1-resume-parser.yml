name: Deploy Phase 1 - Resume Parser Lambda

# Trigger ONLY when Phase 1 files change
on:
  push:
    branches:
      - main
    paths:
      - 'serverless/phase1/functions/resume-parser-lambda/**'
      - 'serverless/phase1/template.yaml'
      - 'serverless/phase1/samconfig.toml'
      - '.github/workflows/deploy-phase1-resume-parser.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'serverless/phase1/functions/resume-parser-lambda/**'
      - 'serverless/phase1/template.yaml'

env:
  AWS_REGION: us-east-1
  LAMBDA_MODULE: serverless/phase1/functions/resume-parser-lambda
  SAM_TEMPLATE: serverless/phase1/template.yaml
  STACK_NAME: smart-hiring-phase1-deploy

jobs:
  # Single CI job: build → test → package → validate SAM
  # No artifact upload/download needed — eliminates Node.js deprecation warnings
  ci:
    name: Build, Test & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build
        run: ./gradlew :serverless:phase1:functions:resume-parser-lambda:build -x test --no-daemon

      - name: Test
        run: ./gradlew :serverless:phase1:functions:resume-parser-lambda:test --no-daemon

      - name: Package Lambda ZIP
        run: ./gradlew :serverless:phase1:functions:resume-parser-lambda:packageLambdaZip --no-daemon

      - name: Verify ZIP
        run: ls -lh ${{ env.LAMBDA_MODULE }}/build/function.zip

      - name: Install SAM CLI
        run: pip install --upgrade aws-sam-cli

      - name: Validate SAM template
        run: sam validate -t ${{ env.SAM_TEMPLATE }} --lint --region ${{ env.AWS_REGION }}

  # Deploy job: only on push to main, after ci passes
  # Rebuilds ZIP locally so no download-artifact action needed
  deploy:
    name: Deploy to AWS Lambda
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Package Lambda ZIP
        run: ./gradlew :serverless:phase1:functions:resume-parser-lambda:packageLambdaZip --no-daemon

      - name: Install SAM CLI
        run: pip install --upgrade aws-sam-cli

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy using SAM
        run: |
          sam deploy \
            --template-file ${{ env.SAM_TEMPLATE }} \
            --stack-name ${{ env.STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --s3-prefix ${{ env.STACK_NAME }} \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      - name: Health check
        run: |
          HEALTH_ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query 'Stacks[0].Outputs[?OutputKey==`HealthEndpoint`].OutputValue' \
            --output text 2>/dev/null || echo "")

          if [ -z "$HEALTH_ENDPOINT" ]; then
            echo "Health endpoint not found in stack outputs, skipping"
            exit 0
          fi

          for i in {1..5}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_ENDPOINT" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✓ Health check passed"
              exit 0
            fi
            echo "⚠ HTTP $HTTP_CODE, retrying in 5s..."
            sleep 5
          done
          exit 1
