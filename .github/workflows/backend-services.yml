name: backend-services
# Canonical backend CI/CD workflow for build, quality gates, and AWS CodeDeploy.
# Keep backend pipeline ownership here to avoid duplicate or drifting workflows.

on:
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: 'Deployment mode'
        required: true
        default: kubernetes
        type: choice
        options:
          - kubernetes
          - codedeploy
      deploy_service:
        description: 'Service to deploy using CodeDeploy'
        required: true
        type: choice
        options:
          - api-gateway
          - auth-service
          - resume-parser-service
          - candidate-matcher-service
          - interview-prep-service
          - job-analyzer-service
          - screening-bot-service
          - ai-integration-service
          - notification-service
      deploy_environment:
        description: 'Deployment environment (kubernetes: staging|prod, codedeploy: staging|production)'
        required: true
        default: staging
        type: choice
        options:
          - staging
          - prod
          - production
  pull_request:
    paths:
      - 'services/**'
      - 'shared/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'sonar-project.properties'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
  push:
    branches: [ main ]
    paths:
      - 'services/**'
      - 'shared/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'sonar-project.properties'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'

permissions:
  contents: read

jobs:
  validate-dispatch-inputs:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy mode and environment combination
        shell: bash
        run: |
          set -euo pipefail

          MODE="${{ github.event.inputs.deploy_mode }}"
          ENVIRONMENT="${{ github.event.inputs.deploy_environment }}"

          case "${MODE}" in
            kubernetes)
              if [[ "${ENVIRONMENT}" != "staging" && "${ENVIRONMENT}" != "prod" && "${ENVIRONMENT}" != "production" ]]; then
                echo "Invalid deploy_environment '${ENVIRONMENT}' for deploy_mode '${MODE}'. Use staging, prod, or production." >&2
                exit 1
              fi
              ;;
            codedeploy)
              if [[ "${ENVIRONMENT}" != "staging" && "${ENVIRONMENT}" != "production" ]]; then
                echo "Invalid deploy_environment '${ENVIRONMENT}' for deploy_mode '${MODE}'. Use staging or production." >&2
                exit 1
              fi
              ;;
            *)
              echo "Unsupported deploy_mode '${MODE}'." >&2
              exit 1
              ;;
          esac

          echo "workflow_dispatch inputs validated: mode=${MODE}, environment=${ENVIRONMENT}"

  detect-changed-services:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
      count: ${{ steps.compute.outputs.count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute changed service matrix
        id: compute
        shell: bash
        run: |
          set -euo pipefail

          SERVICES=(
            api-gateway
            auth-service
            resume-parser-service
            candidate-matcher-service
            interview-prep-service
            job-analyzer-service
            screening-bot-service
            ai-integration-service
            notification-service
          )

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SELECTED=("${{ github.event.inputs.deploy_service }}")
          else
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              BASE_SHA="${{ github.event.pull_request.base.sha }}"
              HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            else
              BASE_SHA="${{ github.event.before }}"
              HEAD_SHA="${{ github.sha }}"
            fi

            if [[ -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
              SELECTED=("${SERVICES[@]}")
            else
              CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
              echo "$CHANGED_FILES"

              FULL_REBUILD=false
              if echo "$CHANGED_FILES" | grep -Eq '^(shared/|build.gradle$|settings.gradle$|gradle/|gradlew$|gradlew.bat$)'; then
                FULL_REBUILD=true
              fi

              if [[ "$FULL_REBUILD" == "true" ]]; then
                SELECTED=("${SERVICES[@]}")
              else
                SELECTED=()
                for svc in "${SERVICES[@]}"; do
                  if echo "$CHANGED_FILES" | grep -Eq "^services/${svc}/"; then
                    SELECTED+=("$svc")
                  fi
                done
              fi
            fi
          fi

          if [[ ${#SELECTED[@]} -eq 0 ]]; then
            echo 'matrix={"service":[]}' >> "$GITHUB_OUTPUT"
            echo 'count=0' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MATRIX_JSON="$(printf '%s\n' "${SELECTED[@]}" | python3 -c 'import json,sys; print(json.dumps({"service":[l.strip() for l in sys.stdin if l.strip()]}))')"
          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"
          echo "count=${#SELECTED[@]}" >> "$GITHUB_OUTPUT"

  build-services:
    needs: detect-changed-services
    if: needs.detect-changed-services.outputs.count != '0' && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changed-services.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build service
        run: |
          ./gradlew :services:${{ matrix.service }}:build -x test --no-daemon --console=plain

      - name: Prepare publish metadata
        run: |
          mkdir -p out
          cat > "out/${{ matrix.service }}.json" <<EOF
          {
            "component": "services/${{ matrix.service }}",
            "sha": "${{ github.sha }}",
            "builtAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Upload publish metadata
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish-${{ matrix.service }}
          path: out/${{ matrix.service }}.json

  quality-gate:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Build and test all backend modules
        run: |
          ./gradlew clean test jacocoTestReport --no-daemon --console=plain

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            **/build/test-results/test/*.xml
            **/build/reports/tests/test/**

      - name: SonarQube analysis with quality gate
        if: env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != ''
        run: |
          ./gradlew sonarqube \
            -Dsonar.host.url=${SONAR_HOST_URL} \
            -Dsonar.token=${SONAR_TOKEN} \
            -Dsonar.qualitygate.wait=true \
            --no-daemon \
            --console=plain

      - name: SonarQube skipped notice
        if: env.SONAR_TOKEN == '' || env.SONAR_HOST_URL == ''
        run: echo "SONAR_TOKEN or SONAR_HOST_URL is missing. SonarQube checks were skipped."

  resolve-deploy-secrets:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      has_aws_role: ${{ steps.flags.outputs.has_aws_role }}
      has_codedeploy_bucket: ${{ steps.flags.outputs.has_codedeploy_bucket }}
    env:
      AWS_GITHUB_ACTIONS_ROLE_ARN: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
      CODEDEPLOY_ARTIFACT_BUCKET: ${{ secrets.CODEDEPLOY_ARTIFACT_BUCKET }}
    steps:
      - id: flags
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${AWS_GITHUB_ACTIONS_ROLE_ARN}" ]]; then
            echo "has_aws_role=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_aws_role=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ -n "${CODEDEPLOY_ARTIFACT_BUCKET}" ]]; then
            echo "has_codedeploy_bucket=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_codedeploy_bucket=false" >> "$GITHUB_OUTPUT"
          fi

  deploy-service-codedeploy:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_mode == 'codedeploy' && needs.resolve-deploy-secrets.outputs.has_aws_role == 'true' && needs.resolve-deploy-secrets.outputs.has_codedeploy_bucket == 'true'
    needs:
      - validate-dispatch-inputs
      - detect-changed-services
      - resolve-deploy-secrets
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.deploy_environment }}
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      CODEDEPLOY_APP_NAME: ${{ vars.CODEDEPLOY_APP_NAME || 'smart-hiring-assistant' }}
      CODEDEPLOY_GROUP_PREFIX: ${{ vars.CODEDEPLOY_GROUP_PREFIX || 'sha' }}
    strategy:
      matrix: ${{ fromJson(needs.detect-changed-services.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build deployable bootJar
        run: |
          ./gradlew :services:${{ matrix.service }}:bootJar --no-daemon --console=plain

      - name: Package CodeDeploy revision
        shell: bash
        run: |
          set -euo pipefail
          SERVICE="${{ matrix.service }}"
          SHA="${{ github.sha }}"
          BUNDLE_DIR="bundle-${SERVICE}"

          JAR_PATH="$(find "services/${SERVICE}/build/libs" -maxdepth 1 -type f -name '*.jar' | head -n1)"
          if [[ -z "$JAR_PATH" ]]; then
            echo "No jar found for ${SERVICE}" >&2
            exit 1
          fi

          mkdir -p "${BUNDLE_DIR}/scripts"
          cp deploy/codedeploy/appspec.yml "${BUNDLE_DIR}/appspec.yml"
          cp deploy/codedeploy/scripts/*.sh "${BUNDLE_DIR}/scripts/"
          cp "$JAR_PATH" "${BUNDLE_DIR}/service.jar"
          chmod +x "${BUNDLE_DIR}/scripts/"*.sh
          zip -r "${SERVICE}-${SHA}.zip" "${BUNDLE_DIR}"

      - name: Upload revision to S3
        run: |
          aws s3 cp "${{ matrix.service }}-${{ github.sha }}.zip" \
            "s3://${{ secrets.CODEDEPLOY_ARTIFACT_BUCKET }}/codedeploy/${{ matrix.service }}/${{ github.sha }}.zip"

      - name: Create CodeDeploy deployment
        run: |
          DEPLOYMENT_GROUP="${CODEDEPLOY_GROUP_PREFIX}-${{ matrix.service }}-${{ github.event.inputs.deploy_environment }}"
          aws deploy create-deployment \
            --application-name "${CODEDEPLOY_APP_NAME}" \
            --deployment-group-name "${DEPLOYMENT_GROUP}" \
            --revision "revisionType=S3,s3Location={bucket=${{ secrets.CODEDEPLOY_ARTIFACT_BUCKET }},bundleType=zip,key=codedeploy/${{ matrix.service }}/${{ github.sha }}.zip}" \
            --description "Deploy ${{ matrix.service }} from commit ${{ github.sha }}"

  deploy-skipped-notice:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_mode == 'codedeploy' && (needs.resolve-deploy-secrets.outputs.has_aws_role != 'true' || needs.resolve-deploy-secrets.outputs.has_codedeploy_bucket != 'true')
    needs:
      - resolve-deploy-secrets
    runs-on: ubuntu-latest
    steps:
      - name: Missing deployment secrets
        run: echo "Skipping deploy. Configure AWS_GITHUB_ACTIONS_ROLE_ARN and CODEDEPLOY_ARTIFACT_BUCKET secrets to enable CodeDeploy."

  deploy-kubernetes-eks:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_mode == 'kubernetes' && needs.resolve-deploy-secrets.outputs.has_aws_role == 'true'
    needs:
      - validate-dispatch-inputs
      - resolve-deploy-secrets
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.deploy_environment == 'production' && 'prod' || github.event.inputs.deploy_environment }}
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl context for EKS
        run: |
          if [[ -z "${EKS_CLUSTER_NAME}" ]]; then
            echo "EKS_CLUSTER_NAME repository variable is required for kubernetes deploy mode." >&2
            exit 1
          fi
          aws eks update-kubeconfig --name "${EKS_CLUSTER_NAME}" --region "${AWS_REGION}"

      - name: Resolve overlay target
        id: overlay
        shell: bash
        run: |
          set -euo pipefail
          case "${{ github.event.inputs.deploy_environment }}" in
            staging) OVERLAY=staging ;;
            prod|production) OVERLAY=prod ;;
            *) echo "Unsupported deploy_environment: ${{ github.event.inputs.deploy_environment }}" >&2; exit 1 ;;
          esac
          echo "overlay=${OVERLAY}" >> "$GITHUB_OUTPUT"

      - name: Replace immutable tag token in overlay
        run: |
          OVERLAY_PATH="infrastructure/kubernetes/overlays/${{ steps.overlay.outputs.overlay }}/kustomization.yaml"
          sed -i.bak "s/__GIT_SHA__/${GITHUB_SHA}/g" "${OVERLAY_PATH}"
          rm -f "${OVERLAY_PATH}.bak"

      - name: Apply Kubernetes overlay
        run: |
          kubectl apply -k infrastructure/kubernetes/overlays/${{ steps.overlay.outputs.overlay }}
          kubectl -n smart-hiring rollout status deploy/api-gateway --timeout=180s

  deploy-kubernetes-skipped-notice:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_mode == 'kubernetes' && needs.resolve-deploy-secrets.outputs.has_aws_role != 'true'
    needs:
      - resolve-deploy-secrets
    runs-on: ubuntu-latest
    steps:
      - name: Missing Kubernetes deployment secret
        run: echo "Skipping kubernetes deploy. Configure AWS_GITHUB_ACTIONS_ROLE_ARN and EKS_CLUSTER_NAME to enable EKS apply."

