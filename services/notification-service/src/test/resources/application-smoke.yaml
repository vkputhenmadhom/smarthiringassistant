spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        hbm2ddl:
          create_namespaces: true
  mail:
    host: localhost
    port: 2525

notification:
  email:
    enabled: false
  sms:
    enabled: false

logging:
  level:
    org.springframework.amqp: INFO
    org.vinod.sha.notification: INFO

