spring:
  application:
    name: interview-prep-service
  mongodb:
    uri: ${MONGODB_URI:mongodb://${MONGODB_USER:hiring_user}:${MONGODB_PASSWORD:hiring_password}@${MONGODB_HOST:localhost}:${MONGODB_PORT:27017}/${MONGODB_DATABASE:smart_hiring_db}?authSource=${MONGODB_AUTH_SOURCE:admin}}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:hiring_user}
    password: ${RABBITMQ_PASSWORD:hiring_password}
    virtual-host: ${RABBITMQ_VHOST:/}

server:
  port: 8004
  servlet:
    context-path: /api/interviews

openai:
  api:
    key: ${OPENAI_API_KEY:sk-your-key-here}
  model: gpt-4-turbo-preview

interview:
  question:
    generation:
      count: 5
      difficulty-levels: ["easy", "medium", "hard"]

logging:
  level:
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
