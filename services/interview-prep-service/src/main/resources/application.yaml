spring:
  application:
    name: interview-prep-service
  mongodb:
      uri: mongodb://hiring_user:hiring_password@localhost:27017/smart_hiring_db?authSource=admin
  rabbitmq:
    host: localhost
    port: 5672
    username: hiring_user
    password: hiring_password
    virtual-host: /

server:
  port: 8004
  servlet:
    context-path: /api/interviews

openai:
  api:
    key: ${OPENAI_API_KEY:sk-your-key-here}
  model: gpt-4-turbo-preview

interview:
  question:
    generation:
      count: 5
      difficulty-levels: ["easy", "medium", "hard"]

logging:
  level:
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

