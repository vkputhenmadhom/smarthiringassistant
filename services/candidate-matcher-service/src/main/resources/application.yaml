spring:
  application:
    name: candidate-matcher-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:smart_hiring_db}
    username: ${POSTGRES_USER:hiring_user}
    password: ${POSTGRES_PASSWORD:hiring_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: hiring
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-candidate-matcher.sql
  cache:
    type: redis
    redis:
      time-to-live: 3600000 # 1 hour
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:hiring_user}
    password: ${RABBITMQ_PASSWORD:hiring_password}
    virtual-host: ${RABBITMQ_VHOST:/}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:hiring_password}
      timeout: 2000ms

server:
  port: 8003
  servlet:
    context-path: /api/matches

grpc:
  server:
    port: 9003

matching:
  algorithm:
    skill-weight: 0.5
    experience-weight: 0.3
    education-weight: 0.2

events:
  outbox:
    enabled: true
    relay-interval-ms: 3000
  inbox:
    enabled: true
  replay:
    enabled: true

logging:
  level:
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  main:
    allow-circular-references: true
