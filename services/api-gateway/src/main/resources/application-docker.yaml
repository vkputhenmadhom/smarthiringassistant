spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://auth-service:8001
              predicates:
                - Path=/api/auth/**
              filters:
                - name: RequestSize
                  args:
                    maxSize: 2MB
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@ipKeyResolver}"
                    redis-rate-limiter.replenishRate: 50
                    redis-rate-limiter.burstCapacity: 100
                    redis-rate-limiter.requestedTokens: 1

            - id: resume-parser-service
              uri: http://resume-parser-service:8002
              predicates:
                - Path=/api/resumes/**
              filters:
                - name: RequestSize
                  args:
                    maxSize: 12MB
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@ipKeyResolver}"
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    redis-rate-limiter.requestedTokens: 1

            - id: job-analyzer-service
              uri: http://job-analyzer-service:8005
              predicates:
                - Path=/api/jobs/**
              filters:
                - name: RequestSize
                  args:
                    maxSize: 2MB
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@ipKeyResolver}"
                    redis-rate-limiter.replenishRate: 20
                    redis-rate-limiter.burstCapacity: 40
                    redis-rate-limiter.requestedTokens: 1
