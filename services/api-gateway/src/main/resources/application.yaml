spring:
  main:
    web-application-type: reactive   # force reactive – prevents MVC security autoconfiguration
  application:
    name: smart-hiring-assistant
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:hiring_password}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:hiring_user}
    password: ${RABBITMQ_PASSWORD:hiring_password}
    virtual-host: ${RABBITMQ_VHOST:/}
  cloud:
    gateway:
      routes:
        # Auth Service
        - id: auth-service
          uri: http://localhost:8001
          predicates:
            - Path=/api/auth/**
          filters:
            - RewritePath=/api/auth(?<segment>/?.*), $\{segment}
            - name: RequestSize
              args:
                maxSize: 2MB
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipKeyResolver}"
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
                redis-rate-limiter.requestedTokens: 1
        
        # Resume Parser Service
        - id: resume-parser-service
          uri: http://localhost:8002
          predicates:
            - Path=/api/resumes/**
          filters:
            - RewritePath=/api/resumes(?<segment>/?.*), $\{segment}
            - name: RequestSize
              args:
                maxSize: 12MB
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipKeyResolver}"
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
        
        # Candidate Matcher Service
        - id: candidate-matcher-service
          uri: http://localhost:8003
          predicates:
            - Path=/api/matches/**
          filters:
            - RewritePath=/api/matches(?<segment>/?.*), $\{segment}
            - name: RequestSize
              args:
                maxSize: 2MB
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipKeyResolver}"
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1
        
        # Interview Prep Service
        - id: interview-prep-service
          uri: http://localhost:8004
          predicates:
            - Path=/api/interviews/**
          filters:
            - RewritePath=/api/interviews(?<segment>/?.*), $\{segment}
            - name: RequestSize
              args:
                maxSize: 2MB
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipKeyResolver}"
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1
        
        # Job Analyzer Service
        - id: job-analyzer-service
          uri: http://localhost:8005
          predicates:
            - Path=/api/jobs/**
          filters:
            - RewritePath=/api/jobs(?<segment>/?.*), $\{segment}
            - name: RequestSize
              args:
                maxSize: 2MB
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipKeyResolver}"
                redis-rate-limiter.replenishRate: 25
                redis-rate-limiter.burstCapacity: 50
                redis-rate-limiter.requestedTokens: 1
        
        # Screening Bot Service
        - id: screening-bot-service
          uri: http://localhost:8006
          predicates:
            - Path=/api/screening/**
          filters:
            - RewritePath=/api/screening(?<segment>/?.*), $\{segment}
            - name: RequestSize
              args:
                maxSize: 2MB
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipKeyResolver}"
                redis-rate-limiter.replenishRate: 25
                redis-rate-limiter.burstCapacity: 50
                redis-rate-limiter.requestedTokens: 1
        
        # Notification Service
        - id: notification-service
          uri: http://localhost:8007
          predicates:
            - Path=/api/notifications/**
          filters:
            - RewritePath=/api/notifications(?<segment>/?.*), $\{segment}
            - name: RequestSize
              args:
                maxSize: 1MB
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipKeyResolver}"
                redis-rate-limiter.replenishRate: 15
                redis-rate-limiter.burstCapacity: 30
                redis-rate-limiter.requestedTokens: 1
      
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials Vary
        - AddResponseHeader=X-Response-Source, API-Gateway
  jackson:
    default-property-inclusion: non_null
  graphql:
    graphiql:
      enabled: true
      path: /graphiql
    http:
      path: /graphql
    websocket:
      path: /graphql-ws

server:
  port: 8000

app:
  security:
    cors:
      # Comma-separated allowlist. Override in production with exact frontend origins.
      allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:5173}

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        slowCallRateThreshold: 60
        slowCallDurationThreshold: 2s
        permittedNumberOfCallsInHalfOpenState: 5
        waitDurationInOpenState: 30s
        automaticTransitionFromOpenToHalfOpenEnabled: true
    instances:
      auth-service:
        baseConfig: default
      resume-parser-service:
        baseConfig: default
      candidate-matcher-service:
        baseConfig: default
      job-analyzer-service:
        baseConfig: default
      screening-bot-service:
        baseConfig: default

  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 200ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
    instances:
      auth-service:
        baseConfig: default
      resume-parser-service:
        baseConfig: default
      candidate-matcher-service:
        baseConfig: default
      job-analyzer-service:
        baseConfig: default
      screening-bot-service:
        baseConfig: default

  timelimiter:
    configs:
      default:
        timeoutDuration: 2s
        cancelRunningFuture: true
    instances:
      auth-service:
        baseConfig: default
      resume-parser-service:
        baseConfig: default
      candidate-matcher-service:
        baseConfig: default
      job-analyzer-service:
        baseConfig: default
      screening-bot-service:
        baseConfig: default

  bulkhead:
    configs:
      default:
        maxConcurrentCalls: 40
        maxWaitDuration: 50ms
    instances:
      auth-service:
        baseConfig: default
      resume-parser-service:
        baseConfig: default
      candidate-matcher-service:
        baseConfig: default
      job-analyzer-service:
        baseConfig: default
      screening-bot-service:
        baseConfig: default

