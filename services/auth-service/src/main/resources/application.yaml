spring:
  application:
    name: auth-service
  sql:
    init:
      mode: always
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:smart_hiring_db}
    username: ${POSTGRES_USER:hiring_user}
    password: ${POSTGRES_PASSWORD:hiring_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:replace-me}
            client-secret: ${GOOGLE_CLIENT_SECRET:replace-me}
            # Must match the URL registered in Google Cloud Console.
            # Use localhost:8001 (auth-service direct) – NOT the gateway – so the
            # JSESSIONID that carries the OAuth2 state survives the round-trip.
            redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8001/api/auth/login/oauth2/code/google}
            scope: openid,profile,email
          linkedin:
            client-id: ${LINKEDIN_CLIENT_ID:replace-me}
            client-secret: ${LINKEDIN_CLIENT_SECRET:replace-me}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid,profile,email
            client-name: LinkedIn
            provider: linkedin
        provider:
          linkedin:
            authorization-uri: https://www.linkedin.com/oauth/v2/authorization
            token-uri: https://www.linkedin.com/oauth/v2/accessToken
            user-info-uri: https://api.linkedin.com/v2/userinfo
            user-name-attribute: sub
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8001
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:hiring_user}
    password: ${RABBITMQ_PASSWORD:hiring_password}
    virtual-host: ${RABBITMQ_VHOST:/}

server:
  port: 8001
  servlet:
    context-path: /api/auth

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000 # 1 hour in milliseconds
  refresh-expiration: 604800000 # 7 days in milliseconds

events:
  outbox:
    enabled: true
    relay-interval-ms: 3000
  replay:
    enabled: true

app:
  oauth2:
    success-redirect-uri-candidate: ${OAUTH2_SUCCESS_REDIRECT_URI_CANDIDATE:http://localhost:5173/auth/callback}
    success-redirect-uri-hr-admin: ${OAUTH2_SUCCESS_REDIRECT_URI_HR_ADMIN:http://localhost:4200/auth/callback}
    failure-redirect-uri: ${OAUTH2_FAILURE_REDIRECT_URI:http://localhost:5173/login}

management:
  server:
    port: 9001   # separate management port – no context-path, no security filter chain
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

logging:
  level:
    root: INFO
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
