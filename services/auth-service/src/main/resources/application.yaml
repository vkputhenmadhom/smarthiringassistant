spring:
  application:
    name: auth-service
  sql:
    init:
      mode: always
  datasource:
    url: jdbc:postgresql://localhost:5432/smart_hiring_db
    username: hiring_user
    password: hiring_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:replace-me}
            client-secret: ${GOOGLE_CLIENT_SECRET:replace-me}
            redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8000/api/auth/login/oauth2/code/google}
            scope: openid,profile,email
          linkedin:
            client-id: ${LINKEDIN_CLIENT_ID:replace-me}
            client-secret: ${LINKEDIN_CLIENT_SECRET:replace-me}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid,profile,email
            client-name: LinkedIn
            provider: linkedin
        provider:
          linkedin:
            authorization-uri: https://www.linkedin.com/oauth/v2/authorization
            token-uri: https://www.linkedin.com/oauth/v2/accessToken
            user-info-uri: https://api.linkedin.com/v2/userinfo
            user-name-attribute: sub
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8001
  rabbitmq:
    host: localhost
    port: 5672
    username: hiring_user
    password: hiring_password
    virtual-host: /

server:
  port: 8001
  servlet:
    context-path: /api/auth

jwt:
  secret: VpytNml18b0NoLrGL+S4kPnyhNNj4CMHpEUas44IZ6Jgsr91FVA8qPwznevpKVJ+
  expiration: 3600000 # 1 hour in milliseconds
  refresh-expiration: 604800000 # 7 days in milliseconds

events:
  outbox:
    enabled: true
    relay-interval-ms: 3000
  replay:
    enabled: true

app:
  oauth2:
    success-redirect-uri: ${OAUTH2_SUCCESS_REDIRECT_URI:http://localhost:5173/auth/callback}
    failure-redirect-uri: ${OAUTH2_FAILURE_REDIRECT_URI:http://localhost:5173/login}

logging:
  level:
    root: INFO
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
