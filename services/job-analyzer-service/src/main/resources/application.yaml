spring:
  application:
    name: job-analyzer-service
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:hiring_user}
    password: ${RABBITMQ_PASSWORD:hiring_password}
    virtual-host: ${RABBITMQ_VHOST:/}
  mongodb:
    uri: ${MONGODB_URI:mongodb://${MONGODB_USER:hiring_user}:${MONGODB_PASSWORD:hiring_password}@${MONGODB_HOST:localhost}:${MONGODB_PORT:27017}/${MONGODB_DATABASE:smart_hiring_db}?authSource=${MONGODB_AUTH_SOURCE:admin}}

server:
  port: 8005
  servlet:
    context-path: /api/jobs

openai:
  api:
    key: ${OPENAI_API_KEY:sk-your-key-here}
  model: gpt-4-turbo-preview

job:
  analyzer:
    extract-salary: true
    extract-skills: true
    predict-market-salary: true

# ── External job-board sync ───────────────────────────────────────────────────
# Set job-sync.enabled=true (or env JOB_SYNC_ENABLED=true) to activate.
# Provide at least one source API key to start pulling real jobs.
#
# Sources
#   JSearch  (RapidAPI) – aggregates LinkedIn, Indeed, Glassdoor, ZipRecruiter
#     → https://rapidapi.com/letscrape-6bRBa3QguO5/api/jsearch  (free: 200 req/month)
#   Adzuna               – broad job board aggregator
#     → https://developer.adzuna.com  (free: 250 req/day)
# ─────────────────────────────────────────────────────────────────────────────
job-sync:
  enabled: ${JOB_SYNC_ENABLED:false}
  cron: "0 0 */6 * * *"          # every 6 hours
  max-per-sync: 50
  country: us
  keywords:
    - "software engineer"
    - "platform engineer"
    - "backend engineer"
    - "full-stack developer"
    - "devops engineer"
  jsearch:
    api-key:    ${JSEARCH_API_KEY:}
    base-url:   https://jsearch.p.rapidapi.com
    date-posted: week
    num-pages:  1
  adzuna:
    app-id:            ${ADZUNA_APP_ID:}
    app-key:           ${ADZUNA_APP_KEY:}
    base-url:          https://api.adzuna.com/v1/api
    results-per-page:  20
  # ── India government + PSU jobs ─────────────────────────────────────────────
  # Sources: Adzuna /in/ (Naukri, LinkedIn IN, Indeed.co.in, TimesJobs)
  #        + JSearch country=in (LinkedIn India, Indeed.co.in)
  # NOTE: NCS (ncs.gov.in) has no public API. Adzuna/JSearch DO carry listings
  #       from DRDO, ISRO, NTPC, BHEL, Indian Railways, IBPS, SBI etc.
  # Set JOB_SYNC_INDIA_ENABLED=true to activate (reuses same API keys above).
  # ─────────────────────────────────────────────────────────────────────────────
  india:
    enabled:      ${JOB_SYNC_INDIA_ENABLED:false}
    max-per-sync: 30
    keywords:
      - "government engineer India"
      - "PSU jobs India"
      - "DRDO scientist"
      - "ISRO engineer"
      - "NTPC engineer"
      - "BHEL engineer"
      - "Indian Railways engineer"
      - "IBPS bank jobs"
      - "central government jobs"

logging:
  level:
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      service: job-analyzer-service
