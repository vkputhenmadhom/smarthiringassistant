spring:
  application:
    name: ai-integration-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:hiring_password}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:hiring_user}
    password: ${RABBITMQ_PASSWORD:hiring_password}
    virtual-host: ${RABBITMQ_VHOST:/}

server:
  port: 8008
  servlet:
    context-path: /api/ai

openai:
  api:
    key: ${OPENAI_API_KEY:sk-your-key-here}
  
ai:
  provider: openai
  cache:
    enabled: true
    ttl-minutes: 60
  rate-limit:
    enabled: true
    requests-per-minute: 60

logging:
  level:
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
