spring:
  application:
    name: screening-bot-service
  rabbitmq:
    host: localhost
    port: 5672
    username: hiring_user
    password: hiring_password
    virtual-host: /
  mongodb:
    uri: mongodb://hiring_user:hiring_password@localhost:27017/smart_hiring_db?authSource=admin
  data:
    redis:
      host: localhost
      port: 6379
      password: hiring_password

server:
  port: 8006
  servlet:
    context-path: /api/screening

openai:
  api:
    key: ${OPENAI_API_KEY:sk-your-key-here}
  model: gpt-4-turbo-preview

screening:
  bot:
    stages: ["initial", "technical", "behavioral"]
    timeout-seconds: 300
    max-questions: 10

events:
  inbox:
    enabled: true
  replay:
    enabled: true

saga:
  screening:
    enabled: true

logging:
  level:
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  metrics:
    tags:
      service: screening-bot-service

