spring:
  application:
    name: screening-bot-service
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:hiring_user}
    password: ${RABBITMQ_PASSWORD:hiring_password}
    virtual-host: ${RABBITMQ_VHOST:/}
  mongodb:
    uri: ${SPRING_MONGODB_URI:${MONGODB_URI:mongodb://${MONGODB_USER:hiring_user}:${MONGODB_PASSWORD:hiring_password}@${MONGODB_HOST:localhost}:${MONGODB_PORT:27017}/${MONGODB_DATABASE:smart_hiring_db}?authSource=${MONGODB_AUTH_SOURCE:admin}}}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:hiring_password}
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 8006
  servlet:
    context-path: /api/screening

openai:
  api:
    key: ${OPENAI_API_KEY:sk-your-key-here}
  model: gpt-4-turbo-preview

screening:
  bot:
    stages: ["initial", "technical", "behavioral"]
    timeout-seconds: 300
    max-questions: 10

jwt:
  secret: ${JWT_SECRET}

events:
  inbox:
    enabled: true
  replay:
    enabled: true

saga:
  screening:
    enabled: true

logging:
  level:
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  metrics:
    tags:
      service: screening-bot-service
