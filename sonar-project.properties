sonar.projectKey=SmartHiringAssistant
sonar.projectName=SmartHiringAssistant
sonar.sourceEncoding=UTF-8

# Monorepo source layout
sonar.sources=services,shared
sonar.tests=services,shared
sonar.test.inclusions=**/src/test/**
sonar.exclusions=**/build/**,**/generated/**,frontend/**,infrastructure/**,docs/**

# JUnit and JaCoCo reports generated by Gradle
sonar.junit.reportPaths=**/build/test-results/test
sonar.coverage.jacoco.xmlReportPaths=**/build/reports/jacoco/test/jacocoTestReport.xml

# Java bytecode locations
sonar.java.binaries=**/build/classes/java/main
sonar.java.test.binaries=**/build/classes/java/test

