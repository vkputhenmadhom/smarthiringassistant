version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: smart-hiring-postgres
    environment:
      POSTGRES_USER: hiring_user
      POSTGRES_PASSWORD: hiring_password
      POSTGRES_DB: smart_hiring_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hiring_user -d smart_hiring_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-hiring-network

  # MongoDB for document storage
  mongodb:
    image: mongo:7.0
    container_name: smart-hiring-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: hiring_user
      MONGO_INITDB_ROOT_PASSWORD: hiring_password
      MONGO_INITDB_DATABASE: smart_hiring_db
    volumes:
      - mongodb_data:/data/db
      - ./infrastructure/db/mongo-init.js:/docker-entrypoint-initdb.d/init.js
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-hiring-network

  # RabbitMQ for Event-Driven Architecture
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: smart-hiring-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: hiring_user
      RABBITMQ_DEFAULT_PASS: hiring_password
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infrastructure/messaging/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    ports:
      - "5672:5672"     # AMQP port
      - "15672:15672"   # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-hiring-network

  # Redis for Caching
  redis:
    image: redis:7.2-alpine
    container_name: smart-hiring-redis
    command: redis-server --requirepass hiring_password --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-hiring-network

  # Zookeeper for Kafka (optional, for future event streaming)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: smart-hiring-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - smart-hiring-network

  # Kafka for Event Streaming (optional, alternative to RabbitMQ)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: smart-hiring-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
      - "9093:9093"
    networks:
      - smart-hiring-network

  # Elasticsearch for Logging
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    container_name: smart-hiring-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-hiring-network

  # Kibana for Log Visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.0
    container_name: smart-hiring-kibana
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      - elasticsearch
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-hiring-network

  # Jaeger for Distributed Tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: smart-hiring-jaeger
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: :9411
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"
      - "14250:14250"
      - "14268:14268"
      - "14269:14269"
      - "9411:9411"
    networks:
      - smart-hiring-network

  # Prometheus for Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: smart-hiring-prometheus
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - smart-hiring-network

  # Grafana for Metrics Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: smart-hiring-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=hiring_password
      - GF_SECURITY_ADMIN_USER=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - smart-hiring-network

  # ── Angular HR Admin Dashboard ────────────────────────────────────────────
  hr-admin-dashboard:
    build:
      context: ./frontend/hr-admin-dashboard
      dockerfile: Dockerfile
    container_name: smart-hiring-hr-dashboard
    ports:
      - "4200:80"
    depends_on:
      - api-gateway
    networks:
      - smart-hiring-network

  # ── React Candidate Portal ─────────────────────────────────────────────────
  candidate-portal:
    build:
      context: ./frontend/candidate-portal
      dockerfile: Dockerfile
    container_name: smart-hiring-candidate-portal
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
    networks:
      - smart-hiring-network

volumes:
  postgres_data:
  mongodb_data:
  rabbitmq_data:
  redis_data:
  elasticsearch_data:
  prometheus_data:
  grafana_data:

networks:
  smart-hiring-network:
    driver: bridge

