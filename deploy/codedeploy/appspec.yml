version: 0.0
os: linux
files:
  - source: /
    destination: /opt/smart-hiring/incoming
hooks:
  BeforeInstall:
    - location: scripts/stop_service.sh
      timeout: 180
      runas: root
  AfterInstall:
    - location: scripts/install_service.sh
      timeout: 300
      runas: root
  ApplicationStart:
    - location: scripts/start_service.sh
      timeout: 180
      runas: root
  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 120
      runas: root
