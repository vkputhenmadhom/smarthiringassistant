asyncapi: 2.6.0
info:
  title: Smart Hiring Assistant Event Contracts
  version: 0.1.0
  description: Canonical asynchronous contract definitions for messaging integrations.

servers:
  rabbitmq:
    url: localhost:5672
    protocol: amqp
    description: Local RabbitMQ broker

channels:
  auth.user.registered:
    description: User registration lifecycle event
    publish:
      message:
        name: UserRegisteredEvent
        payload:
          type: object
          required: [userId, username, email, role, timestamp]
          properties:
            userId: { type: string }
            username: { type: string }
            email: { type: string }
            role: { type: string }
            timestamp: { type: string, format: date-time }

  resume.parsed:
    description: Resume parsing completion event
    publish:
      message:
        name: ResumeParseEvent
        payload:
          type: object
          required: [resume_id, user_id, status, parsed_at]
          properties:
            resume_id: { type: string }
            user_id: { type: integer }
            file_name: { type: string }
            skills:
              type: array
              items: { type: string }
            experience_years: { type: number }
            location: { type: string }
            status: { type: string }
            parsed_at: { type: integer }
            error_message: { type: string }

  matcher.candidate.matched:
    description: Candidate matched to job event
    publish:
      message:
        name: CandidateMatchedEvent
        payload:
          type: object
          required: [match_id, candidate_id, job_id, match_score, matched_at]
          properties:
            match_id: { type: string }
            candidate_id: { type: integer }
            job_id: { type: string }
            match_score: { type: number }
            skill_match_percentage: { type: number }
            experience_match_percentage: { type: number }
            matched_at: { type: integer }
            status: { type: string }

